worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript text/xml;

    # ── Docker DNS resolver (allows upstream to resolve at runtime) ──
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── Shared proxy settings for the FastAPI backend ──
    upstream api_backend {
        server api:8000;
    }

    # ── archivearbitrage.com — Landing page ──
    server {
        listen 80;
        server_name archivearbitrage.com www.archivearbitrage.com;

        root /usr/share/nginx/landing;
        index index.html;

        # Static assets — long cache
        location ~* \.(css|js|png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Brand guides (clean URLs: /guides/chrome-hearts → chrome-hearts.html)
        location /guides/ {
            try_files $uri $uri.html $uri/ /guides/index.html;
        }

        # Case study
        location /case-study {
            try_files /case-study.html =404;
        }

        # Tools
        location /tools/ {
            try_files $uri $uri.html $uri/ =404;
        }

        # Fallback
        location / {
            try_files $uri $uri.html $uri/ =404;
        }
    }

    # ── app.archivearbitrage.com — User dashboard + API ──
    server {
        listen 80;
        server_name app.archivearbitrage.com;

        # API routes → FastAPI backend
        location /api/ {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE support for streaming
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
        }

        # Stripe webhook — direct to API (no buffering)
        location = /api/stripe/webhook {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Stripe-Signature $http_stripe_signature;
            proxy_buffering off;
        }

        # Dashboard static files
        root /usr/share/nginx/dashboard;
        index index.html;

        location ~* \.(css|js|png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
            expires 7d;
            add_header Cache-Control "public";
        }

        # SPA fallback — all non-API, non-static routes → index.html
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
